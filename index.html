<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Speech</title>
</head>
<body>
    <div class = "container">

        <textarea name = "speechInput" id="speechInput" rows="4" cols="50"></textarea>
        <div class="control rows">
            <div class="d-flex gap-2 align-items-center">
                <select id="voiceSelect" class="form-select form-select-sm"></select>
                <button class="btn btn-sm btn-outline-secondary"
                    onclick="loadVoices()"> 🔄️ Refresh Voices 🔄️</button>
            </div>

            <div class="d-flex gap-2 align-items-center">
                <button class="btn btn-warning btn-sm" onclick="speak()"> 🔊 Read </button>
                <button class="btn btn-warning btn-sm" onclick="pauseSpeech()">⏸️ pauseSpeech </button>
                <button class="btn btn-success btn-sm" onlick="resumeSpeech()"> resumeSpeech</button>
                <button class="btn btn btn-danger btn-sm" onclick="stopSpeech()">🤚 </button>
            </div>
        </div>
    </div>
    <script src="speech.js"></script>
</body>
</html>
